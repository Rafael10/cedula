<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Validador de Cédula de Rafael Uribe</title>

<style>

body{
    background:linear-gradient(#ffffff,#f2f2f2);
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* TARJETA CEDULA */
.cedula{
    width:420px;
    background:linear-gradient(135deg,#0b3d91,#1f5cc4);
    color:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.titulo{
    font-size:18px;
    font-weight:bold;
    letter-spacing:1px;
    margin-bottom:20px;
}

.label{
    font-size:14px;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    font-size:18px;
    letter-spacing:3px;
}

button{
    margin-top:15px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#ffd000;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ffea61;
}

.resultado{
    margin-top:15px;
    font-size:16px;
    font-weight:bold;
}

.correcta{
    color:#7CFF9A;
}

.incorrecta{
    color:#ff7c7c;
}

</style>
</head>

<body>

<div class="cedula">

<div class="titulo">
REPÚBLICA DOMINICANA<br>
JUNTA CENTRAL ELECTORAL
</div>

<div class="label">Número de Cédula</div>

<input type="text" id="cedula" placeholder="000-0000000-0">

<button onclick="validarCedula()">Validar Cédula</button>

<div id="resultado" class="resultado"></div>

</div>


<script>

function validarCedula(){

let cedula = document.getElementById("cedula").value.replace(/-/g,"");
let resultado = document.getElementById("resultado");

if(!/^\d{11}$/.test(cedula)){
    resultado.textContent = "CÉDULA ES INCORRECTA";
    resultado.className="resultado incorrecta";
    return;
}

let suma = 0;

for(let i=0;i<10;i++){

let digito = parseInt(cedula[i]);
let multiplicador = (i % 2 === 0) ? 1 : 2;

let res = digito * multiplicador;

if(res > 9){
res = Math.floor(res/10) + (res % 10);
}

suma += res;

}

let digitoVerificador = (10 - (suma % 10)) % 10;
let ultimo = parseInt(cedula[10]);

if(digitoVerificador === ultimo){
resultado.textContent = "CÉDULA ES CORRECTA";
resultado.className="resultado correcta";
}
else{
resultado.textContent = "CÉDULA ES INCORRECTA";
resultado.className="resultado incorrecta";
}

}

</script>

</body>
</html>
